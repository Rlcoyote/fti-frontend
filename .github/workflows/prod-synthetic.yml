# ─── Nightly synthetic against PRODUCTION (v28.322, E2E arc) ─────────────────
# Read-only checks of the live app, ON CALL. Catches what
# only shows in the real environment — a bad deploy, dropped cache headers,
# a dead endpoint — before a crew does. No credentials, no mutations.
name: Prod Synthetic
# Manual-trigger ONLY (Reggie 2026-07-14: "I'll call for a run when needed.
# It's not time for that yet."). Run: gh workflow run prod-synthetic.yml
on:
  workflow_dispatch:

jobs:
  synthetic:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: FE serves and carries a commit
        run: |
          set -e
          V=$(curl -fsS https://app.flotest.com/version.json)
          echo "$V"
          echo "$V" | grep -q '"commit"'
      - name: FE cache policy intact (the 7/14 stale-bundle fence)
        run: |
          set -e
          curl -fsSI https://app.flotest.com/ | grep -i "cache-control" | grep -q "no-cache"
          ASSET=$(curl -fsS https://app.flotest.com/ | grep -oE 'assets/index-[^"]+\.js' | head -1)
          curl -fsSI "https://app.flotest.com/$ASSET" | grep -i "cache-control" | grep -q "immutable"
      - name: BE healthy and versioned
        run: |
          set -e
          curl -fsS https://fti-app-production.up.railway.app/api/health | grep -q '"ok"'
          curl -fsS https://fti-app-production.up.railway.app/api/version | grep -q '"commit"'
      # These two probes EXPECT a 4xx — the route's own rejection, not the auth
      # wall. No -f here: -f discards the body on any 4xx, which made this test
      # unpassable as written (caught on its first-ever run, 2026-07-20). The
      # body text proves WHICH layer answered; the status code is asserted too.
      - name: Session-less sign REACHES the route (middleware-order fence, v28.327)
        run: |
          set -e
          RESP=$(curl -sS -w "\n%{http_code}" -X POST https://fti-app-production.up.railway.app/api/jsas/00000000-0000-0000-0000-000000000000/sign \
            -H "Content-Type: application/json" \
            -d '{"method":"biometric","webauthn_response":{},"pending_token":"synthetic"}')
          BODY=$(echo "$RESP" | sed '$d'); CODE=$(echo "$RESP" | tail -1)
          echo "$CODE $BODY"
          [ "$CODE" = "401" ]
          echo "$BODY" | grep -q "Invalid sign session"
          ! echo "$BODY" | grep -q "Authentication required"
      - name: Sign-link landing rejects garbage with a proper error (not silence)
        run: |
          set -e
          RESP=$(curl -sS -w "\n%{http_code}" -X POST https://fti-app-production.up.railway.app/api/jsas/sign-options \
            -H "Content-Type: application/json" \
            -d '{"token":"synthetic","user_id":"00000000-0000-0000-0000-000000000000","jsa_id":"00000000-0000-0000-0000-000000000000"}')
          BODY=$(echo "$RESP" | sed '$d'); CODE=$(echo "$RESP" | tail -1)
          echo "$CODE $BODY"
          [ "$CODE" = "400" ]
          echo "$BODY" | grep -q "Invalid or unknown sign link"
