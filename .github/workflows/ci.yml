# v28.57 — CI gate per CAM Article XXXI.
#
# Runs on every push to main and every pull request. Executes lint as a
# blocking check. Failed CI blocks merge. Bypass requires explicit human
# override with written justification.
#
# Format check is intentionally NOT in this CI run — Prettier formatting
# is enforced via pre-commit lint-staged on STAGED files only, so existing
# files keep their style until touched. Adding format-check-on-CI would
# fail on every existing file and require a one-shot reformat of the
# whole codebase, which destroys git blame for the affected lines.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
