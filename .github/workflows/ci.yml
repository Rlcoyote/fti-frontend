# v28.57 — CI gate per CAM Article XXXI (now XXI post-molt).
# v28.322 — E2E arc: the lint-only gate grows unit tests + the Playwright
# workflow suite. A workflow that breaks fails the build HERE — not in a
# crew's hands. (Railway "Wait for CI" must be ON for a red run to block
# the deploy — dashboard toggle.)
#
# Runs on every push to main and every pull request. Failed CI blocks merge.
# Bypass requires explicit human override with written justification.
#
# Format check is intentionally NOT in this CI run — Prettier formatting
# is enforced via pre-commit lint-staged on STAGED files only, so existing
# files keep their style until touched. Adding format-check-on-CI would
# fail on every existing file and require a one-shot reformat of the
# whole codebase, which destroys git blame for the affected lines.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Unit + E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx eslint . --quiet
      - run: node scripts/check-tutorial.mjs
      - run: npx vitest run
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
