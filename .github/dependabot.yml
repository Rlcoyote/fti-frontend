# Dependabot configuration — automated dependency vulnerability monitoring.
#
# Opens a pull request whenever a dependency has a known security
# advisory (npm audit equivalent), so vulnerable versions surface within
# hours of disclosure rather than waiting for a manual audit pass.
#
# Weekly cadence for non-security updates keeps the noise manageable.
# Security updates fire immediately regardless of schedule.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(actions)"
